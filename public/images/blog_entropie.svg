<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#1A1840"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>
    <linearGradient id="shackleGrad" x1="600" y1="108" x2="600" y2="255"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E0E7FF"/>
      <stop offset="55%"  stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="490" y1="250" x2="490" y2="405"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818CF8"/>
      <stop offset="45%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="f6" ><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="f18"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="f45"><feGaussianBlur stdDeviation="45"/></filter>
    <filter id="bodyGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Étoiles -->
  <circle cx="72"   cy="36"  r="1.2" fill="white" opacity="0.55"/>
  <circle cx="195"  cy="88"  r="0.9" fill="white" opacity="0.38"/>
  <circle cx="318"  cy="48"  r="1.4" fill="white" opacity="0.5"/>
  <circle cx="448"  cy="25"  r="0.9" fill="white" opacity="0.42"/>
  <circle cx="700"  cy="20"  r="1.3" fill="white" opacity="0.55"/>
  <circle cx="858"  cy="52"  r="0.8" fill="white" opacity="0.38"/>
  <circle cx="985"  cy="30"  r="1.2" fill="white" opacity="0.48"/>
  <circle cx="1088" cy="62"  r="1.0" fill="white" opacity="0.42"/>
  <circle cx="1172" cy="26"  r="0.9" fill="white" opacity="0.58"/>
  <circle cx="55"   cy="285" r="1.0" fill="white" opacity="0.32"/>
  <circle cx="118"  cy="175" r="0.8" fill="white" opacity="0.38"/>
  <circle cx="148"  cy="418" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="268"  cy="462" r="0.9" fill="white" opacity="0.30"/>
  <circle cx="922"  cy="442" r="1.1" fill="white" opacity="0.35"/>
  <circle cx="1042" cy="472" r="0.8" fill="white" opacity="0.30"/>
  <circle cx="1132" cy="412" r="1.3" fill="white" opacity="0.42"/>
  <circle cx="1182" cy="262" r="1.0" fill="white" opacity="0.50"/>
  <circle cx="872"  cy="158" r="1.1" fill="#22D3EE" opacity="0.48"/>
  <circle cx="992"  cy="188" r="0.9" fill="#22D3EE" opacity="0.36"/>
  <circle cx="1105" cy="138" r="1.2" fill="#22D3EE" opacity="0.42"/>
  <circle cx="202"  cy="152" r="1.0" fill="#818CF8" opacity="0.45"/>
  <circle cx="342"  cy="192" r="0.8" fill="#818CF8" opacity="0.36"/>

  <!-- Lueurs ambiantes -->
  <ellipse cx="600" cy="320" rx="320" ry="240" fill="url(#halo)"    filter="url(#f45)"/>
  <ellipse cx="990" cy="125" rx="230" ry="165" fill="url(#cyanHalo)" filter="url(#f45)"/>
  <ellipse cx="215" cy="405" rx="210" ry="145" fill="#3730A3" opacity="0.06" filter="url(#f45)"/>

  <!-- Rayons subtils -->
  <g stroke="#818CF8" stroke-width="1" opacity="0.045">
    <line x1="600" y1="318" x2="170"  y2="40"/>
    <line x1="600" y1="318" x2="65"   y2="278"/>
    <line x1="600" y1="318" x2="170"  y2="475"/>
    <line x1="600" y1="318" x2="598"  y2="495"/>
    <line x1="600" y1="318" x2="1030" y2="475"/>
    <line x1="600" y1="318" x2="1130" y2="278"/>
    <line x1="600" y1="318" x2="1030" y2="40"/>
    <line x1="600" y1="318" x2="598"  y2="18"/>
    <line x1="600" y1="318" x2="375"  y2="38"/>
    <line x1="600" y1="318" x2="825"  y2="38"/>
  </g>

  <!-- Caractères flottants — gauche (sombres, entropie faible) -->
  <text x="65"  y="200" font-family="monospace" font-size="42" fill="#6366F1" opacity="0.10" transform="rotate(-14,65,200)">A</text>
  <text x="122" y="308" font-family="monospace" font-size="26" fill="#818CF8" opacity="0.08" transform="rotate(8,122,308)">!</text>
  <text x="55"  y="380" font-family="monospace" font-size="46" fill="#6366F1" opacity="0.07" transform="rotate(-5,55,380)">9</text>
  <text x="192" y="142" font-family="monospace" font-size="24" fill="#818CF8" opacity="0.10">Z</text>
  <text x="168" y="445" font-family="monospace" font-size="32" fill="#6366F1" opacity="0.08" transform="rotate(12,168,445)">@</text>
  <text x="308" y="75"  font-family="monospace" font-size="22" fill="#818CF8" opacity="0.12">7</text>
  <text x="352" y="448" font-family="monospace" font-size="26" fill="#6366F1" opacity="0.09" transform="rotate(-8,352,448)">k</text>
  <text x="415" y="105" font-family="monospace" font-size="20" fill="#818CF8" opacity="0.10">*</text>
  <text x="442" y="425" font-family="monospace" font-size="34" fill="#6366F1" opacity="0.07" transform="rotate(10,442,425)">P</text>
  <text x="392" y="215" font-family="monospace" font-size="30" fill="#6366F1" opacity="0.13" transform="rotate(-18,392,215)">l</text>
  <text x="428" y="365" font-family="monospace" font-size="24" fill="#818CF8" opacity="0.11" transform="rotate(14,428,365)">2</text>

  <!-- Caractères flottants — droite (lumineux, entropie forte) -->
  <text x="818"  y="142" font-family="monospace" font-size="26" fill="#22D3EE" opacity="0.22" transform="rotate(-10,818,142)">M</text>
  <text x="890"  y="392" font-family="monospace" font-size="22" fill="#818CF8" opacity="0.24" transform="rotate(6,890,392)">é</text>
  <text x="962"  y="115" font-family="monospace" font-size="32" fill="#22D3EE" opacity="0.18" transform="rotate(-5,962,115)">1</text>
  <text x="1022" y="338" font-family="monospace" font-size="24" fill="#818CF8" opacity="0.22">8</text>
  <text x="1065" y="212" font-family="monospace" font-size="28" fill="#22D3EE" opacity="0.17" transform="rotate(8,1065,212)">*</text>
  <text x="1102" y="392" font-family="monospace" font-size="36" fill="#6366F1" opacity="0.14" transform="rotate(-12,1102,392)">D</text>
  <text x="1150" y="152" font-family="monospace" font-size="20" fill="#22D3EE" opacity="0.24">!</text>
  <text x="765"  y="182" font-family="monospace" font-size="28" fill="#818CF8" opacity="0.22" transform="rotate(12,765,182)">o</text>
  <text x="782"  y="380" font-family="monospace" font-size="30" fill="#6366F1" opacity="0.19" transform="rotate(-8,782,380)">/</text>

  <!-- ===== CADENAS ===== -->

  <!-- Grande lueur derrière le cadenas -->
  <ellipse cx="600" cy="330" rx="145" ry="115" fill="#6366F1" opacity="0.25" filter="url(#f45)"/>
  <ellipse cx="600" cy="300" rx="80"  ry="60"  fill="#818CF8" opacity="0.18" filter="url(#f18)"/>

  <!-- Anse — glow externe flou -->
  <path d="M537 255 V183 C537 108 663 108 663 183 V255"
        fill="none" stroke="#818CF8" stroke-width="28" stroke-linecap="round"
        opacity="0.15" filter="url(#f18)"/>

  <!-- Anse — corps principal (bezier fiable) -->
  <path d="M537 255 V183 C537 108 663 108 663 183 V255"
        fill="none" stroke="url(#shackleGrad)" stroke-width="16" stroke-linecap="round"
        filter="url(#shGlow)"/>


  <!-- Corps — glow externe -->
  <rect x="480" y="244" width="240" height="162" rx="22" fill="#5B5BD6" opacity="0.30" filter="url(#f18)"/>

  <!-- Corps — principal -->
  <rect x="488" y="250" width="224" height="155" rx="20" fill="url(#bodyGrad)" filter="url(#bodyGlow)"/>

  <!-- Corps — reflet haut -->
  <rect x="496" y="252" width="210" height="6"   rx="3"  fill="white" opacity="0.20"/>

  <!-- Corps — reflet bord gauche -->
  <rect x="491" y="258" width="4"   height="138" rx="2"  fill="white" opacity="0.10"/>

</svg>
